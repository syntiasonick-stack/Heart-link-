<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HeartLink Chat</title>
<style>
body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f9f9f9; }
header { background:#ff6f61; color:white; padding:20px; text-align:center; }
.container { max-width:600px; margin:30px auto; background:white; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.1); padding:20px; }
.coin-balance { text-align:center; margin-bottom:20px; font-size:18px; font-weight:bold; }
.chat-box { border:1px solid #ddd; height:300px; overflow-y:scroll; padding:10px; background:#fafafa; border-radius:4px; margin-bottom:10px; }
.chat-input { display:flex; margin-top:10px; }
.chat-input input { flex:1; padding:10px; border:1px solid #ddd; border-radius:4px; }
.chat-input button { padding:10px 15px; background:#ff6f61; color:white; border:none; border-radius:4px; cursor:pointer; margin-left:5px; }
.auth-container input { width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:4px; }
.auth-container button { padding:10px 15px; background:#ff6f61; color:white; border:none; border-radius:4px; cursor:pointer; margin-right:5px; }
#authMessage { color:red; margin-top:10px; }
</style>
</head>
<body>
<header><h1>HeartLink Chat</h1></header>

<div class="container">
  <!-- Login / Sign-Up Form -->
  <div id="authContainer" class="auth-container">
    <h2>Login / Sign Up</h2>
    <input type="email" id="emailInput" placeholder="Email">
    <input type="password" id="passwordInput" placeholder="Password">
    <button onclick="signUp()">Sign Up</button>
    <button onclick="signIn()">Login</button>
    <p id="authMessage"></p>
  </div>

  <!-- Chat Container -->
  <div class="chat-container" style="display:none;">
    <div class="coin-balance">Coins: <span id="coinCount">100</span></div>
    <div class="chat-box" id="chatBox"></div>
    <div class="chat-input">
      <input type="text" id="messageInput" placeholder="Type your message...">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<script>
let currentUser = null;
let coins = 100;

// ---------------- Sign Up ----------------
function signUp() {
  const email = document.getElementById("emailInput").value.trim();
  if(!email) { document.getElementById("authMessage").textContent = "Enter email"; return; }

  if(localStorage.getItem(email)) {
    document.getElementById("authMessage").textContent = "User already exists. Login!";
    return;
  }

  const user = { email: email, coins: 100 };
  localStorage.setItem(email, JSON.stringify(user));
  document.getElementById("authMessage").textContent = "Sign up successful! Login now.";
}

// ---------------- Login ----------------
function signIn() {
  const email = document.getElementById("emailInput").value.trim();
  if(!email) { document.getElementById("authMessage").textContent = "Enter email"; return; }

  const user = JSON.parse(localStorage.getItem(email));
  if(!user) { document.getElementById("authMessage").textContent = "User not found. Sign up first."; return; }

  currentUser = user;
  coins = currentUser.coins;

  document.getElementById("authContainer").style.display = "none";
  document.querySelector(".chat-container").style.display = "block";
  document.getElementById("coinCount").textContent = coins;
  document.getElementById("authMessage").textContent = "";
}

// ---------------- Send Message ----------------
function sendMessage() {
  const input = document.getElementById("messageInput");
  const chatBox = document.getElementById("chatBox");
  const coinDisplay = document.getElementById("coinCount");

  if(input.value.trim() === "") {
    alert("Type a message first!");
    return;
  }

  if(coins <= 0) {
    alert("You have no coins left. Buy more coins.");
    return;
  }

  coins--;
  coinDisplay.textContent = coins;

  // Save coins for this user
  currentUser.coins = coins;
  localStorage.setItem(currentUser.email, JSON.stringify(currentUser));

  const newMessage = document.createElement("div");
  newMessage.textContent = input.value;
  chatBox.appendChild(newMessage);

  input.value = "";
  chatBox.scrollTop = chatBox.scrollHeight;
}
</script>
</body>
</html>
