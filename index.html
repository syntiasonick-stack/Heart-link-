<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HeartLink Chat & Marketplace</title>
<style>
body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f9f9f9; }
header { background:#ff6f61; color:white; padding:20px; text-align:center; }
header p { font-size:14px; margin-top:5px; }
.container { max-width:600px; margin:30px auto; background:white; border-radius:8px; padding:20px; }
.chat-box, #itemsList { border:1px solid #ddd; height:200px; overflow-y:scroll; padding:10px; background:#fafafa; border-radius:4px; margin-bottom:10px; }
.chat-input, .sell-input { display:flex; margin-top:10px; }
.chat-input input, .sell-input input { flex:1; padding:10px; border:1px solid #ddd; border-radius:4px; margin-right:5px; }
.chat-input button, .sell-input button { padding:10px 15px; background-color:#ff6f61; color:white; border:none; border-radius:4px; cursor:pointer; }
footer { text-align:center; margin:20px 0; font-size:12px; color:#888; }
</style>

<!-- Supabase JS library -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

<header>
  <h1>HeartLink Chat & Marketplace</h1>
  <p>Owned and developed by Omotayo Fanegan</p>
</header>

<div class="container" id="authContainer">
  <h2>Login / Sign Up</h2>
  <input type="email" id="emailInput" placeholder="Email">
  <input type="password" id="passwordInput" placeholder="Password">
  <button onclick="signIn()">Sign In</button>
  <button onclick="signUp()">Sign Up</button>
  <p id="authMessage" style="color:red;"></p>
</div>

<div class="container" id="chatContainer" style="display:none;">
  <div class="coin-balance">Coins: <span id="coinCount">0</span></div>

  <h3>Chat</h3>
  <div class="chat-box" id="chatBox"></div>
  <div class="chat-input">
    <input type="text" id="messageInput" placeholder="Type your message...">
    <button onclick="sendMessage()">Send</button>
  </div>

  <h3>Marketplace</h3>
  <div id="itemsList"></div>
  <div class="sell-input">
    <input type="text" id="itemName" placeholder="Item Name">
    <input type="text" id="itemDesc" placeholder="Description">
    <input type="number" id="itemPrice" placeholder="Price in coins">
    <button onclick="sellItem()">List Item</button>
  </div>
</div>

<footer>
  &copy; 2026 Omotayo Fanegan. All rights reserved.
</footer>

<script src="script.js"></script>
</body>
</html>
